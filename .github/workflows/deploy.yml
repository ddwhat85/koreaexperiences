name: Deploy to Cloudways
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.KE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.KE_SFTP_HOST }}
          SFTP_USER: ${{ secrets.KE_SFTP_USER }}
          REMOTE_PATH: ${{ secrets.KE_REMOTE_PATH }}
        run: |
          printf 'put ./index.html %sindex.html\n' "$REMOTE_PATH" | sftp -b - -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -P 22 "$SFTP_USER@$SFTP_HOST"

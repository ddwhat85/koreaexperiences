name: TrafficAI Daily Publish

on:
  schedule:
    - cron: '10 23 * * *'
    - cron: '5 3 * * *'
    - cron: '20 9 * * *'
    - cron: '10 13 * * *'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Target slot (leave empty for auto-pick)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests beautifulsoup4 openai

    - name: Run TrafficAI
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        AI_PROVIDER: openai
        PYTHONUTF8: "1"
        PYTHONIOENCODING: "utf-8"
      run: |
        cd traffic-ai-engine
        mkdir -p logs state
        SCHEDULE="${{ github.event.schedule }}"
        MANUAL_SLOT="${{ github.event.inputs.slot }}"
        case "$SCHEDULE" in
          "10 23 * * *") SLOT="08:10" ;;
          "5 3 * * *")   SLOT="12:05" ;;
          "20 9 * * *")  SLOT="18:20" ;;
          "10 13 * * *") SLOT="22:10" ;;
          *)             SLOT="$MANUAL_SLOT" ;;
        esac
        if [ -n "$SLOT" ]; then
          echo "Running with explicit slot: $SLOT"
          python daily_runner.py --limit 1 --slot "$SLOT"
        else
          echo "No slot specified, using next available slot"
          python daily_runner.py --limit 1
        fi

    - name: Save publish state
      run: |
        git config user.name "TrafficAI Bot"
        git config user.email "trafficai@ddwhat85"
        git add traffic-ai-engine/state/ traffic-ai-engine/logs/ || true
        git diff --staged --quiet || git commit -m "chore: publish state [skip ci]"
        git push || true
